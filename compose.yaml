services:
  linux-dev:
    build:
      # context 指定构建的上下文环境，通常设为根目录 '.'
      # 这样 Docker 才能访问到根目录下的 src 等文件夹（如果构建时需要的话）
      context: .
      # dockerfile 指定相对于 context 的路径
      dockerfile: ./linux/Dockerfile
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
    container_name: linux_workspace
    volumes:
      - ./linux/workspace:/workspace
    working_dir: /workspace
    ports:
      - "2222:22"
  postgres:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: abc123@

  mysql:
    image: mysql:8.4
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: abc123@
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: abc123@
    volumes:
      - ./mysql/data:/var/lib/mysql

  mongodb:
    image: mongo:8.0
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: abc123@
    volumes:
      - ./mongodb/data:/data/db
